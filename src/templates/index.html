<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumBytes Copy Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0f;
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #00f0ff;
            --neon-purple: #8a2be2;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --text-main: #ffffff;
            --text-muted: #8b8b9f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(138, 43, 226, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        /* Glassmorphism Container */
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            width: 90%;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        .status-badge.paused {
            background: rgba(255, 51, 102, 0.1);
            color: var(--neon-red);
            border: 1px solid rgba(255, 51, 102, 0.3);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            transition: left 0.5s ease;
        }

        .stat-card:hover::before {
            left: 100%;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-value.positive {
            color: var(--neon-green);
        }
        
        .stat-value.negative {
            color: var(--neon-red);
        }

        /* Positions Table */
        .positions-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            overflow-x: auto;
        }

        .positions-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        td {
            font-size: 15px;
            font-weight: 500;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .side-long {
            color: var(--neon-green);
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
        }

        .side-short {
            color: var(--neon-red);
            background: rgba(255, 51, 102, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Animations */
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.6); }
            100% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        }

        @keyframes pulseRed {
            0% { box-shadow: 0 0 10px rgba(255, 51, 102, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 51, 102, 0.6); }
            100% { box-shadow: 0 0 10px rgba(255, 51, 102, 0.2); }
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
            height: 20px;
            width: 50%;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Tabs and Logs */
        .tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .tab-btn.active {
            background: rgba(0, 240, 255, 0.15);
            color: var(--neon-blue);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .log-console {
            background: #050508;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 16px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
            color: #cfcfd1;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
            display: block;
        }

        .log-level-info { color: var(--neon-blue); font-weight: bold; }
        .log-level-warning { color: #ffd700; font-weight: bold; }
        .log-level-error { color: var(--neon-red); font-weight: bold; }
        .log-level-success { color: var(--neon-green); font-weight: bold; }
        .log-level-track { color: #f0f; font-weight: bold; }
        
        .view-section {
            display: none;
        }
        
        .view-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="header">
            <h1>QuantumBytes Copy Trader</h1>
            <div id="statusBadge" class="status-badge">● LIVE</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Mode</div>
                <div class="stat-value" id="valMode"><div class="skeleton" style="width:80px"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Wallet Balance</div>
                <div class="stat-value" id="valBalance"><div class="skeleton"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Unrealized PnL</div>
                <div class="stat-value" id="valPnl"><div class="skeleton"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Trades Copied</div>
                <div class="stat-value" id="valTrades"><div class="skeleton" style="width:40px"></div></div>
            </div>
            <div class="stat-card" style="grid-column: span 2;">
                <div class="stat-label">Target Wallet</div>
                <div class="stat-value" id="valTarget" style="font-size: 16px; line-height: 1.5; color: var(--neon-blue); font-family: monospace; word-break: break-all;"><div class="skeleton"></div></div>
            </div>
            <div class="stat-card" style="grid-column: span 2;">
                <div class="stat-label">Your Wallet</div>
                <div class="stat-value" id="valExecutor" style="font-size: 16px; line-height: 1.5; color: var(--neon-purple); font-family: monospace; word-break: break-all;"><div class="skeleton"></div></div>
            </div>
        </div>

        <div class="positions-container">
            <div class="positions-header" style="justify-content: space-between;">
                <div>Information Panel</div>
                <div class="tabs">
                    <button id="btn-positions" class="tab-btn active" onclick="switchTab('positions')">Active Positions (<span id="posCount">0</span>)</button>
                    <button id="btn-logs" class="tab-btn" onclick="switchTab('logs')">Terminal Logs</button>
                </div>
            </div>

            <div id="view-positions" class="view-section active">
                <table>
                    <thead>
                        <tr>
                            <th>Coin</th>
                            <th>Side</th>
                            <th>Size</th>
                            <th>Entry Price</th>
                            <th>Current Price</th>
                            <th>Margin / Value</th>
                            <th>PnL</th>
                        </tr>
                    </thead>
                    <tbody id="positionsTable">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">Loading positions...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="view-logs" class="view-section">
                <div id="logConsole" class="log-console">
                    <div style="color:var(--text-muted)">[System] Establishing connection to backend log stream...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatCurrency(num) {
            return '$' + parseFloat(num).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Update Status Badge
                const badge = document.getElementById('statusBadge');
                if (data.status === 'ACTIVE') {
                    badge.textContent = '● ACTIVE';
                    badge.className = 'status-badge';
                    badge.style.animation = 'pulse 2s infinite';
                } else {
                    badge.textContent = '■ PAUSED';
                    badge.className = 'status-badge paused';
                    badge.style.animation = 'pulseRed 2s infinite';
                }

                // Update Stats
                document.getElementById('valMode').textContent = data.mode;
                document.getElementById('valTarget').textContent = data.target_wallet;
                document.getElementById('valExecutor').textContent = data.executor_wallet;
                document.getElementById('valBalance').textContent = formatCurrency(data.balance);
                document.getElementById('valTrades').textContent = data.trades_copied;
                
                const pnlEl = document.getElementById('valPnl');
                pnlEl.textContent = formatCurrency(data.pnl);
                if (data.pnl > 0) pnlEl.className = 'stat-value positive';
                else if (data.pnl < 0) pnlEl.className = 'stat-value negative';
                else pnlEl.className = 'stat-value';

                // Update Positions
                const table = document.getElementById('positionsTable');
                document.getElementById('posCount').textContent = data.positions.length;
                
                if (data.positions.length === 0) {
                    table.innerHTML = '<tr><td colspan="7"><div class="empty-state">No open positions right now.</div></td></tr>';
                } else {
                    let html = '';
                    data.positions.forEach(p => {
                        const sideClass = (p.side || '').toUpperCase() === 'LONG' ? 'side-long' : 'side-short';
                        const pnlVal = p.unrealized_pnl !== undefined ? p.unrealized_pnl : 0;
                        const pnlColor = pnlVal > 0 ? 'var(--neon-green)' : (pnlVal < 0 ? 'var(--neon-red)' : 'var(--text-muted)');
                        const notional = Math.abs(p.size || 0) * (p.entry_price || 0);
                        const margin = p.margin || (p.leverage > 0 ? notional / p.leverage : notional);
                        const currentPrice = p.current_price || p.entry_price || 0;
                        const coin = p.symbol || '—';
                        
                        html += `
                            <tr>
                                <td style="font-weight:800; color:var(--neon-blue); font-size:16px; letter-spacing:0.5px;">
                                    ${coin}
                                    <span style="font-size:11px; color:var(--text-muted); font-weight:500; margin-left:4px;">${p.leverage}x</span>
                                </td>
                                <td><span class="${sideClass}">${(p.side || '').toUpperCase()}</span></td>
                                <td>${Math.abs(p.size || 0).toFixed(4)}</td>
                                <td>${formatCurrency(p.entry_price || 0)}</td>
                                <td style="color:var(--text-muted);">${currentPrice > 0 ? formatCurrency(currentPrice) : '—'}</td>
                                <td>${formatCurrency(margin)}</td>
                                <td style="color:${pnlColor}; font-weight:600;">${formatCurrency(pnlVal)}</td>
                            </tr>
                        `;
                    });
                    table.innerHTML = html;
                }

            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        // Fetch immediately and every 2 seconds
        fetchStatus();
        setInterval(fetchStatus, 2000);

        // --- Log Streaming Logic ---
        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById('view-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            // Auto scroll logs to bottom when switching
            if (tabId === 'logs') {
                const con = document.getElementById('logConsole');
                con.scrollTop = con.scrollHeight;
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                const con = document.getElementById('logConsole');
                
                // Only auto-scroll if user is already at the bottom (sticky scroll feature)
                const isAtBottom = con.scrollHeight - con.scrollTop <= con.clientHeight + 80;
                
                let html = '';
                data.logs.forEach(line => {
                    // Simple regex to colorize the loguru Python output based on severity
                    let formatted = line
                        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") // sanitize HTML
                        .replace(/\| (INFO\s*)\|/, '| <span class="log-level-info">$1</span>|')
                        .replace(/\| (WARNING\s*)\|/, '| <span class="log-level-warning">$1</span>|')
                        .replace(/\| (ERROR\s*)\|/, '| <span class="log-level-error">$1</span>|')
                        .replace(/\| (SUCCESS\s*)\|/, '| <span class="log-level-success">$1</span>|')
                        .replace(/\| (TRACK\s*)\|/, '| <span class="log-level-track">$1</span>|');
                    
                    html += `<div>${formatted}</div>`;
                });
                
                con.innerHTML = html || '<div style="color:var(--text-muted)">No logs available yet...</div>';
                
                if (isAtBottom && document.getElementById('view-logs').classList.contains('active')) {
                    con.scrollTop = con.scrollHeight;
                }
            } catch (error) {
                console.error('Error fetching logs:', error);
            }
        }

        fetchLogs();
        setInterval(fetchLogs, 1500);
    </script>
</body>
</html>
